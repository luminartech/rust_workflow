# CI for this repository itself.
#
# rust-ci.yml is workflow_call-only, so this workflow is the repo's own gate:
# - pre-commit: YAML hygiene, actionlint, typos, gitleaks, markdown formatting
# - smoke-test: invokes rust-ci.yml against the fixture crate at the repo root
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v7
        id: python
        with:
          python-version: '3.12'
      # Inlined replacement for pre-commit/action, which is in maintenance
      # mode and pins an actions/cache version with a deprecated Node runtime.
      - name: Install pre-commit
        run: python -m pip install pre-commit
      - uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py${{ steps.python.outputs.python-version }}-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Run pre-commit
        run: pre-commit run --show-diff-on-failure --color=always --all-files

  # Exercise the reusable workflow end to end against the fixture crate.
  # Stages that need external state are disabled: fuzzing (no fuzz targets),
  # semver-checks (no published baseline), security (advisory-database churn
  # would make the gate flaky), and publish.
  smoke-test:
    name: Smoke Test
    uses: ./.github/workflows/rust-ci.yml
    with:
      run-pre-commit: false
      run-fuzz-tests: false
      run-miri-tests: false
      run-semver-checks: false
      run-security: false
      # The fixture sets `publish = false`, which cargo publish rejects even
      # with --dry-run.
      run-publish-dry-run: false
      publish-crate: false
      upload-coverage: false
