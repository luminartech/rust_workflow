name: Bug Report
description: File a bug report
title: "fix(<scope>): <short description>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How do you reliably reproduce the issue?
      placeholder: |
        1. Run beacon with ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages, panic output, or logs.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: beacon Version
      placeholder: "e.g. 0.1.0 or commit SHA"
    validations:
      required: false
